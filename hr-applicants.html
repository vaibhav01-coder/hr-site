<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicants | HR Hiring Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260416d">
</head>
<body data-page="hr-applicants">
    <header class="site-header slim">
        <div class="container nav-wrap">
            <a class="brand" href="index.html"><span class="brand-mark">HR</span><span class="brand-text">Hiring Portal</span></a>
            <nav class="site-nav inline-nav">
                <a href="hr-dashboard.html">Back to HR Dashboard</a>
                <a href="#" data-logout>Logout</a>
            </nav>
        </div>
    </header>
    <main class="section">
        <div class="container">
            <section class="surface hpro-page-banner">
                <div class="hpro-page-banner-copy">
                    <span class="eyebrow">Applicants</span>
                    <h1 id="applicants-heading">Applicants for selected job</h1>
                    <p>Review candidate profiles and resumes with clear hiring status visibility.</p>
                </div>
                <div class="hpro-page-banner-media">
                    <img src="assets/hiring-campaign-2.jpeg" alt="Applicants review banner">
                </div>
            </section>
            <div class="page-head" style="margin-bottom:14px;">
                <span class="eyebrow">Review Table</span>
                <h2>Applicant records</h2>
                <p>Filter and review candidate resume details efficiently.</p>
            </div>
            <div class="surface table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Job</th>
                            <th>Experience</th>
                            <th>Resume</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="job-applicant-rows"></tbody>
                </table>
            </div>
        </div>
    </main>
    <div id="toast-root" class="toast-root"></div>
    <script src="api-config.js?v=20260416d"></script>
    <script src="app.js?v=20260416d"></script>
</body>
</html>
