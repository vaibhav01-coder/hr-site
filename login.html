<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HR Hiring Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">
    <main class="auth-shell">
        <section class="surface auth-card">
            <span class="eyebrow">Login</span>
            <h1 id="login-title">Candidate sign in</h1>
            <p>First choose your role, then sign in.</p>
            <div class="role-choice-grid">
                <button type="button" class="role-choice-btn" data-role-select="candidate">I am User</button>
                <button type="button" class="role-choice-btn" data-role-select="hr_admin">I am Admin</button>
            </div>
            <form id="login-form" class="auth-form">
                <label class="field">
                    <span>Login As</span>
                    <select id="login-role" required>
                        <option value="candidate">User (Candidate)</option>
                        <option value="hr_admin">Admin</option>
                    </select>
                </label>
                <label class="field"><span id="login-identifier-label">Email Address</span><input id="login-identifier" type="email" required></label>
                <label class="field"><span>Password</span><input id="login-password" type="password" required></label>
                <button id="login-submit" type="submit" class="btn btn-primary full-width">Login</button>
            </form>
            <p class="muted-line" id="login-status">Use your registered credentials. Admin can use direct Admin ID and password.</p>
            <p class="muted-line">Local admin default: ID <strong>admin</strong>, Password <strong>admin123</strong></p>
            <div class="auth-links">
                <a id="login-register-hint" href="register.html">New user? Complete Registration</a>
                <a href="jobs.html">Browse Jobs</a>
            </div>
        </section>
    </main>
    <div id="toast-root" class="toast-root"></div>
    <script src="api-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
