<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | HR Hiring Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="register">
    <main class="auth-shell">
        <section class="surface auth-card">
            <span class="eyebrow">Candidate Registration</span>
            <h1>Create your account</h1>
            <p>Frontend preview for /register with OTP-ready onboarding.</p>
            <form id="register-form" class="auth-form">
                <label class="field"><span>Full Name</span><input type="text" required></label>
                <label class="field"><span>Email Address</span><input type="email" required></label>
                <label class="field"><span>Phone Number</span><input type="tel" required></label>
                <label class="field"><span>Password</span><input type="password" required></label>
                <button type="submit" class="btn btn-primary full-width">Register</button>
            </form>
            <p class="muted-line">Already have an account? <a href="login.html">Login</a></p>
        </section>
    </main>
    <div id="toast-root" class="toast-root"></div>
    <script src="app.js"></script>
</body>
</html>
