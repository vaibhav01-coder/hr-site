<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | HR Hiring Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="register">
    <main class="auth-shell">
        <section class="surface auth-card">
            <span class="eyebrow">Candidate Registration</span>
            <h1>Create your account</h1>
            <p>Create a real account with Supabase email-password signup. Full name and phone are also saved in user metadata.</p>
            <form id="register-form" class="auth-form">
                <label class="field"><span>Full Name</span><input id="register-name" type="text" required></label>
                <label class="field"><span>Email Address</span><input id="register-email" type="email" required></label>
                <label class="field"><span>Phone Number</span><input id="register-phone" type="tel" required></label>
                <label class="field"><span>Password</span><input id="register-password" type="password" minlength="6" required></label>
                <button type="submit" class="btn btn-primary full-width">Register</button>
            </form>
            <p class="muted-line" id="register-status">Supabase signup is connected. Submit the form to create an account.</p>
            <p class="muted-line">Already have an account? <a href="login.html">Login</a></p>
        </section>
    </main>
    <div id="toast-root" class="toast-root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
